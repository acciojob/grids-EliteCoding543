<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap CSS -->

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <title>Bootstrap Grid Layout</title>

  <style>

    .container{
      width: 600px;

      border: 5px solid rgb(4, 255, 4);

      background-color: rgb(41, 0, 0);
    }

    .row{
      height: 200px;

      border: 5px solid rgb(255, 188, 188);
    }

    .col,
    [class*="col-"]{
      border: 2px dotted rgb(38, 38, 43);
    }

    /* Row 1 */

    .r1c1{
      background-color: teal;
    }

    .r1c2{
      background-color: thistle;
    }

    /* Row 2 */

    .r2c1{
      background-color: tomato;
    }

    .r2c2{
      background-color: turquoise;
    }

    /* Row 3 */

    .r3c1{
      background-color: violet;
    }

    .r3c2{
      background-color: yellowgreen;
    }

  </style>
</head>

<body class="bg-light p-4">

  <div class="container">

    <!-- ================= ROW 1 ================= -->

    <div class="row">

      <div class="col-6 col-md-4 r1c1">
        Row1 col1
      </div>

      <div class="col-6 col-md-8 r1c2">
        Row1 col2
      </div>

    </div>

    <!-- ================= ROW 2 ================= -->

    <div class="row">

      <div class="col-md-4 offset-md-2 r2c1">
        Row2 col1
      </div>

      <div class="col-md-4 offset-md-2 r2c2">
        Row2 col2
      </div>

    </div>

    <!-- ================= ROW 3 ================= -->

    <div class="row justify-content-center">

      <div class="col-6 col-md-4 r3c1">
        Row3 col1
      </div>

      <div class="col-6 col-md-4 r3c2">
        Row3 col2
      </div>

    </div>

  </div>

</body>
</html>
